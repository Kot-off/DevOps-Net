version: '3.8'

services:
  security:
    build: .
    container_name: security
    environment:
      - PORT=3000

  uploader:
    image: netology/devkub-uploader:latest
    container_name: uploader
    environment:
      - S3_HOST=storage
      - S3_PORT=9000
      - S3_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - S3_ACCESS_SECRET=${STORAGE_SECRET_KEY}
      - S3_BUCKET=${STORAGE_BUCKET}

  storage:
    image: minio/minio:latest
    container_name: storage
    command: server /data
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY}

  gateway:
    image: nginx:alpine
    container_name: api-gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - security
      - uploader
      - storage