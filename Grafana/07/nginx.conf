events { worker_connections 1024; }

http {
    server {
        listen 80;

        # 1. Регистрация и Логин (Анонимно)
        location /v1/register { proxy_pass http://security:3000/v1/user; }
        location /v1/token { proxy_pass http://security:3000/v1/token; }

        # 2. Приватные зоны (Нужна проверка токена)
        location /v1/user {
            auth_request /auth_verify;
            proxy_pass http://security:3000/v1/user;
        }

        location /v1/upload {
            auth_request /auth_verify;
            proxy_pass http://uploader:3000/v1/upload;
        }

        location /images/ {
            auth_request /auth_verify;
            proxy_pass http://storage:9000/images/;
        }

        # Внутренний механизм проверки токена
        location = /auth_verify {
            internal;
            proxy_pass http://security:3000/v1/token/validation;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }
    }
}