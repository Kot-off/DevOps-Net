global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['security:3000', 'uploader:3000'] # Порты из твоего API Gateway

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['storage:9000']